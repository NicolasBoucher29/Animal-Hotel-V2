<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Animal Hotel V2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(ellipse at 50% 30%, #1e1b4b 0%, #0f0c2e 60%, #070518 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        /* ── Game wrapper: fills viewport maintaining 3:2 ratio ── */
        #game-wrapper {
            position: relative;
            /* Fill as much of the viewport as possible at 3:2 ratio */
            width: min(100vw, 150vh);
            height: min(66.67vw, 100vh);
            max-width: 1440px;
            max-height: 960px;
        }
        #game-canvas {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            display: block;
            border: 3px solid rgba(100, 130, 220, 0.7);
            border-radius: 6px;
            box-shadow:
                0 0 0 1px rgba(80, 110, 200, 0.4),
                0 0 20px rgba(80, 110, 255, 0.3),
                0 0 60px rgba(40, 60, 160, 0.2),
                inset 0 0 30px rgba(0,0,0,0.5);
        }

        /* ── HUD ── */
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
            z-index: 10;
        }
        .hud-item {
            background: linear-gradient(135deg, rgba(10,10,40,0.88), rgba(20,20,60,0.88));
            color: #fff;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            display: flex;
            align-items: center;
            gap: 5px;
            border: 1px solid rgba(100,130,220,0.4);
            backdrop-filter: blur(4px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
            letter-spacing: 0.5px;
        }
        .hud-coins-val { color: #ffd700; font-weight: bold; }
        .hud-stars-val { color: #ff88cc; font-weight: bold; }
        #hud-location { color: #88ccff; font-size: 12px; }
        #hud-save-hint {
            color: rgba(150,180,255,0.55);
            font-size: 10px;
            font-family: 'Courier New', monospace;
            letter-spacing: 0.3px;
        }

        /* ── Dialogue Box ── */
        #dialogue-box {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            background: linear-gradient(160deg, rgba(5,5,30,0.96), rgba(10,10,50,0.96));
            border: 2px solid #5588cc;
            border-radius: 10px;
            padding: 14px 18px 18px;
            color: #e8eeff;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            display: none;
            z-index: 20;
            min-height: 86px;
            box-shadow:
                0 -4px 20px rgba(60, 100, 220, 0.2),
                0 4px 20px rgba(0,0,0,0.5),
                inset 0 1px 0 rgba(100,150,255,0.15);
        }
        #dialogue-speaker {
            color: #ffd966;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 11px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        #dialogue-text {
            min-height: 38px;
            color: #dce8ff;
        }
        #dialogue-choices {
            display: none;
            margin-top: 10px;
            border-top: 1px solid rgba(85,136,204,0.3);
            padding-top: 8px;
        }
        .dialogue-choice {
            padding: 5px 10px;
            margin: 3px 0;
            cursor: pointer;
            color: #8899cc;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            border-radius: 4px;
            transition: all 0.1s;
        }
        .dialogue-choice.selected {
            color: #fff;
            background: linear-gradient(90deg, rgba(85,136,204,0.35), rgba(85,136,204,0.15));
            border-left: 2px solid #5588cc;
            padding-left: 12px;
        }
        #dialogue-continue {
            position: absolute;
            bottom: 9px;
            right: 14px;
            color: #5588cc;
            font-size: 11px;
            animation: blink 0.9s ease-in-out infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        /* ── Menu Overlay ── */
        #menu-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(160deg, rgba(5,5,30,0.97), rgba(10,10,50,0.97));
            display: none;
            z-index: 30;
            padding: 22px 24px;
            color: #fff;
            font-family: 'Courier New', monospace;
            overflow-y: auto;
        }
        #menu-title {
            text-align: center;
            font-size: 18px;
            color: #ffd966;
            margin-bottom: 18px;
            letter-spacing: 3px;
            text-shadow: 0 0 20px rgba(255, 200, 60, 0.5);
        }
        .menu-tabs {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-bottom: 18px;
        }
        .menu-tab {
            padding: 6px 14px;
            background: rgba(85,136,204,0.12);
            border: 1px solid rgba(85,136,204,0.4);
            border-radius: 20px;
            color: #7799cc;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            letter-spacing: 0.5px;
            transition: all 0.15s;
        }
        .menu-tab:hover { background: rgba(85,136,204,0.25); color: #aabbdd; }
        .menu-tab.active {
            background: rgba(85,136,204,0.4);
            border-color: #5588cc;
            color: #fff;
        }
        #menu-content { max-height: 72%; overflow-y: auto; }
        .menu-item {
            padding: 9px 14px;
            margin: 4px 0;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.12s;
        }
        .menu-item:hover { background: rgba(85,136,204,0.18); border-color: rgba(85,136,204,0.3); }

        /* ── Mobile Controls ── */
        #mobile-controls {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 200px;
            pointer-events: none;
            display: none;
            z-index: 15;
        }
        @media (max-width: 768px), (hover: none) and (pointer: coarse) {
            #mobile-controls { display: block; }
        }
        .dpad {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 120px;
            height: 120px;
            pointer-events: auto;
        }
        .dpad-btn {
            position: absolute;
            width: 42px;
            height: 42px;
            background: rgba(255,255,255,0.18);
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.8);
            font-size: 16px;
            pointer-events: auto;
            -webkit-tap-highlight-color: transparent;
            backdrop-filter: blur(4px);
        }
        .dpad-btn:active { background: rgba(85,136,204,0.5); }
        .dpad-up { top: 0; left: 39px; }
        .dpad-down { bottom: 0; left: 39px; }
        .dpad-left { top: 39px; left: 0; }
        .dpad-right { top: 39px; right: 0; }
        .action-buttons {
            position: absolute;
            bottom: 40px;
            right: 30px;
            pointer-events: auto;
        }
        .action-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.35);
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 15px;
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 0 4px;
            pointer-events: auto;
            -webkit-tap-highlight-color: transparent;
            backdrop-filter: blur(4px);
        }
        .btn-a { background: rgba(60,200,100,0.35); }
        .btn-b { background: rgba(200,70,70,0.35); }
        .btn-a:active { background: rgba(60,200,100,0.65); }
        .btn-b:active { background: rgba(200,70,70,0.65); }
        .btn-menu {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 44px;
            height: 28px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 14px;
            color: rgba(255,255,255,0.8);
            font-size: 10px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div id="game-wrapper">
        <canvas id="game-canvas" width="480" height="320"></canvas>

        <!-- HUD -->
        <div id="hud">
            <div class="hud-item" id="hud-location">&#127968; Hotel</div>
            <div id="hud-save-hint">Ctrl+S : Sauvegarder</div>
            <div style="display:flex;gap:6px;">
                <div class="hud-item">&#127775; <span class="hud-coins-val" id="hud-coins">0</span></div>
                <div class="hud-item">&#11088; <span class="hud-stars-val" id="hud-stars">0</span></div>
            </div>
        </div>

        <!-- Dialogue Box -->
        <div id="dialogue-box">
            <div id="dialogue-speaker"></div>
            <div id="dialogue-text"></div>
            <div id="dialogue-choices"></div>
            <div id="dialogue-continue">▼</div>
        </div>

        <!-- Menu Overlay -->
        <div id="menu-overlay">
            <div id="menu-title">&#127966; MENU &#127966;</div>
            <div class="menu-tabs">
                <div class="menu-tab active" data-tab="animals">&#128062; Animaux</div>
                <div class="menu-tab" data-tab="inventory">&#127873; Inventaire</div>
                <div class="menu-tab" data-tab="quests">&#127775; Quetes</div>
                <div class="menu-tab" data-tab="save">&#128190; Sauv.</div>
            </div>
            <div id="menu-content"></div>
        </div>

        <!-- Mobile Controls -->
        <div id="mobile-controls">
            <div class="dpad">
                <div class="dpad-btn dpad-up" data-dir="up">&#9650;</div>
                <div class="dpad-btn dpad-down" data-dir="down">&#9660;</div>
                <div class="dpad-btn dpad-left" data-dir="left">&#9664;</div>
                <div class="dpad-btn dpad-right" data-dir="right">&#9654;</div>
            </div>
            <div class="action-buttons">
                <button class="action-btn btn-a" id="btn-a">A</button>
                <button class="action-btn btn-b" id="btn-b">B</button>
            </div>
            <button class="btn-menu" id="btn-menu">Menu</button>
        </div>
    </div>

    <script>const _v = Date.now();</script>
    <script src="sprites.js"></script>
    <script src="maps.js"></script>
    <script src="data.js"></script>
    <script src="engine.js"></script>
    <script src="entities.js"></script>
    <script src="dialogue.js"></script>
    <script src="quests.js"></script>
    <script src="minigames.js"></script>
    <script src="game.js"></script>
</body>
</html>
