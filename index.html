<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>🐾 Animal Hotel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game">

    <!-- ===== LOADING ===== -->
    <div id="screen-loading" class="screen active">
      <div class="loading-content">
        <div class="loading-paw">🐾</div>
        <h1>Animal Hotel</h1>
        <div class="loading-bar"><div class="loading-fill" id="loading-fill"></div></div>
        <p id="loading-text">Chargement des animaux...</p>
      </div>
    </div>

    <!-- ===== TITLE ===== -->
    <div id="screen-title" class="screen">
      <div class="title-sky">
        <div class="title-cloud c1">☁️</div>
        <div class="title-cloud c2">☁️</div>
        <div class="title-cloud c3">☁️</div>
      </div>
      <div class="title-center">
        <h1 class="title-logo">🐾 Animal Hotel</h1>
        <p class="title-sub">Prends soin des animaux mignons !</p>
        <div class="title-animals" id="title-animals"></div>
        <button class="btn btn-big btn-pink" id="btn-new-game">🎀 Nouvelle Partie</button>
        <button class="btn btn-big btn-blue" id="btn-continue" style="display:none">▶️ Continuer</button>
      </div>
    </div>

    <!-- ===== CHARACTER SELECT ===== -->
    <div id="screen-charselect" class="screen">
      <h2 class="screen-title">Choisis ton personnage !</h2>
      <div class="char-grid" id="char-grid"></div>
      <div id="name-area" style="display:none">
        <p class="label-cute">Comment t'appelles-tu ?</p>
        <input type="text" id="input-name" class="input-cute" maxlength="12" placeholder="Ton prénom..." autocomplete="off">
        <button class="btn btn-big btn-green" id="btn-start">C'est parti ! 🎉</button>
      </div>
    </div>

    <!-- ===== MAIN GAME ===== -->
    <div id="screen-game" class="screen">
      <!-- HUD -->
      <div id="hud">
        <div class="hud-pill hud-room" id="hud-room">🏠 Hall</div>
        <div class="hud-right-pills">
          <div class="hud-pill hud-coins" id="hud-coins">💰 50</div>
          <div class="hud-pill hud-stars" id="hud-stars">⭐ 0</div>
        </div>
      </div>

      <!-- Room area -->
      <div id="room-area"></div>

      <!-- Animal interaction panel -->
      <div id="animal-panel" style="display:none">
        <div class="panel-card">
          <img id="panel-animal-img" class="panel-animal-img" src="" alt="">
          <img id="panel-face-img" class="panel-face-img" src="" alt="">
          <div class="panel-info">
            <h3 id="panel-animal-name"></h3>
            <div class="panel-bars" id="panel-bars"></div>
          </div>
          <div class="panel-actions" id="panel-actions"></div>
          <button class="btn-close-panel" id="btn-close-panel">✕</button>
        </div>
      </div>

      <!-- Dialogue -->
      <div id="dialogue" style="display:none">
        <div class="dialogue-card">
          <div id="dial-speaker" class="dial-speaker"></div>
          <div id="dial-text" class="dial-text"></div>
          <div id="dial-choices" class="dial-choices"></div>
          <div class="dial-tap">Tape pour continuer ✨</div>
        </div>
      </div>

      <!-- Help tooltip -->
      <div id="tooltip" class="tooltip" style="display:none"></div>

      <!-- Bottom nav -->
      <nav id="nav">
        <button class="nav-btn active" data-room="lobby"><span class="nav-ico">🏠</span><span>Hall</span></button>
        <button class="nav-btn" data-room="rooms"><span class="nav-ico">🛏️</span><span>Chambres</span></button>
        <button class="nav-btn" data-room="kitchen"><span class="nav-ico">🍳</span><span>Cuisine</span></button>
        <button class="nav-btn" data-room="bath"><span class="nav-ico">🛁</span><span>Bain</span></button>
        <button class="nav-btn" data-room="shop"><span class="nav-ico">🛍️</span><span>Boutique</span></button>
        <button class="nav-btn" data-room="arcade"><span class="nav-ico">🎮</span><span>Jeux</span></button>
        <button class="nav-btn" data-room="phone"><span class="nav-ico">📱</span><span>Appel</span></button>
      </nav>
    </div>

    <!-- ===== MINIGAME OVERLAY ===== -->
    <div id="screen-minigame" class="screen">
      <canvas id="mini-canvas"></canvas>
      <div id="mini-hud"></div>
      <button class="btn-round btn-close-mini" id="btn-close-mini">✕</button>
      <div id="mini-instructions" class="mini-instructions" style="display:none"></div>
    </div>

    <!-- ===== NOTIFICATION ===== -->
    <div id="notif" class="notif" style="display:none"></div>

    <!-- ===== SAVE INDICATOR ===== -->
    <div id="save-indicator" style="display:none">💾 Sauvegardé !</div>
  </div>

  <script src="data.js"></script>
  <script src="assets.js"></script>
  <script src="audio.js"></script>
  <script src="scenes.js"></script>
  <script src="minigames.js"></script>
  <script src="game.js"></script>
</body>
</html>
