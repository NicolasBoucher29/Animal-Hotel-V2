<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Animal Hotel V2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: monospace;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        #game-wrapper {
            position: relative;
            width: 960px;
            height: 640px;
            max-width: 100vw;
            max-height: 100vh;
        }
        #game-canvas {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            display: block;
            border: 3px solid #4a4a6a;
            border-radius: 4px;
        }
        /* HUD Overlay */
        #hud {
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }
        .hud-item {
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 14px;
            font-family: monospace;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .hud-coin { color: #ffd700; }
        .hud-star { color: #ff69b4; }
        .hud-location { color: #87ceeb; }
        /* Dialogue Box */
        #dialogue-box {
            position: absolute;
            bottom: 8px;
            left: 8px;
            right: 8px;
            background: rgba(0,0,20,0.92);
            border: 3px solid #5588cc;
            border-radius: 8px;
            padding: 12px 16px;
            color: #fff;
            font-family: monospace;
            font-size: 15px;
            line-height: 1.5;
            display: none;
            z-index: 20;
            min-height: 80px;
        }
        #dialogue-speaker {
            color: #ffdd57;
            font-weight: bold;
            margin-bottom: 4px;
            font-size: 13px;
        }
        #dialogue-text {
            min-height: 40px;
        }
        #dialogue-choices {
            display: none;
            margin-top: 8px;
        }
        .dialogue-choice {
            padding: 4px 8px;
            margin: 2px 0;
            cursor: pointer;
            color: #aaa;
            font-family: monospace;
            font-size: 14px;
        }
        .dialogue-choice.selected {
            color: #fff;
            background: rgba(85,136,204,0.3);
            border-radius: 4px;
        }
        #dialogue-continue {
            position: absolute;
            bottom: 8px;
            right: 12px;
            color: #5588cc;
            font-size: 12px;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        /* Menu Overlay */
        #menu-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,20,0.95);
            display: none;
            z-index: 30;
            padding: 20px;
            color: #fff;
            font-family: monospace;
            overflow-y: auto;
        }
        #menu-title {
            text-align: center;
            font-size: 20px;
            color: #ffdd57;
            margin-bottom: 16px;
        }
        .menu-tabs {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 16px;
        }
        .menu-tab {
            padding: 6px 14px;
            background: rgba(85,136,204,0.2);
            border: 2px solid #5588cc;
            border-radius: 4px;
            color: #aaa;
            cursor: pointer;
            font-family: monospace;
            font-size: 13px;
        }
        .menu-tab.active {
            background: rgba(85,136,204,0.5);
            color: #fff;
        }
        #menu-content {
            max-height: 70%;
            overflow-y: auto;
        }
        .menu-item {
            padding: 8px 12px;
            margin: 4px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        .menu-item:hover {
            background: rgba(255,255,255,0.1);
        }
        /* Mobile Controls */
        #mobile-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 200px;
            pointer-events: none;
            display: none;
            z-index: 15;
        }
        @media (max-width: 768px), (hover: none) and (pointer: coarse) {
            #mobile-controls { display: block; }
        }
        .dpad {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 120px;
            height: 120px;
            pointer-events: auto;
        }
        .dpad-btn {
            position: absolute;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.25);
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
            pointer-events: auto;
            -webkit-tap-highlight-color: transparent;
        }
        .dpad-btn:active { background: rgba(255,255,255,0.5); }
        .dpad-up { top: 0; left: 40px; }
        .dpad-down { bottom: 0; left: 40px; }
        .dpad-left { top: 40px; left: 0; }
        .dpad-right { top: 40px; right: 0; }
        .action-buttons {
            position: absolute;
            bottom: 40px;
            right: 30px;
            pointer-events: auto;
        }
        .action-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.4);
            cursor: pointer;
            font-family: monospace;
            font-weight: bold;
            font-size: 16px;
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 0 4px;
            pointer-events: auto;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-a { background: rgba(80,200,120,0.4); }
        .btn-b { background: rgba(200,80,80,0.4); }
        .btn-a:active { background: rgba(80,200,120,0.7); }
        .btn-b:active { background: rgba(200,80,80,0.7); }
        .btn-menu {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 4px;
            color: #fff;
            font-size: 11px;
            font-family: monospace;
            cursor: pointer;
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div id="game-wrapper">
        <canvas id="game-canvas" width="480" height="320"></canvas>
        <div id="hud">
            <div class="hud-item hud-location" id="hud-location">Hotel</div>
            <div style="display:flex;gap:8px;">
                <div class="hud-item"><span class="hud-coin" id="hud-coins">0</span></div>
                <div class="hud-item"><span class="hud-star" id="hud-stars">0</span></div>
            </div>
        </div>
        <div id="dialogue-box">
            <div id="dialogue-speaker"></div>
            <div id="dialogue-text"></div>
            <div id="dialogue-choices"></div>
            <div id="dialogue-continue">...</div>
        </div>
        <div id="menu-overlay">
            <div id="menu-title">MENU</div>
            <div class="menu-tabs">
                <div class="menu-tab active" data-tab="animals">Animaux</div>
                <div class="menu-tab" data-tab="inventory">Inventaire</div>
                <div class="menu-tab" data-tab="quests">Quetes</div>
                <div class="menu-tab" data-tab="save">Sauvegarde</div>
            </div>
            <div id="menu-content"></div>
        </div>
        <div id="mobile-controls">
            <div class="dpad">
                <div class="dpad-btn dpad-up" data-dir="up">^</div>
                <div class="dpad-btn dpad-down" data-dir="down">v</div>
                <div class="dpad-btn dpad-left" data-dir="left">&lt;</div>
                <div class="dpad-btn dpad-right" data-dir="right">&gt;</div>
            </div>
            <div class="action-buttons">
                <button class="action-btn btn-a" id="btn-a">A</button>
                <button class="action-btn btn-b" id="btn-b">B</button>
            </div>
            <button class="btn-menu" id="btn-menu">Menu</button>
        </div>
    </div>

    <script>const _v = Date.now();</script>
    <script src="sprites.js"></script>
    <script src="maps.js"></script>
    <script src="data.js"></script>
    <script src="engine.js"></script>
    <script src="entities.js"></script>
    <script src="dialogue.js"></script>
    <script src="quests.js"></script>
    <script src="minigames.js"></script>
    <script src="game.js"></script>
</body>
</html>
